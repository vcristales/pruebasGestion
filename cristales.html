<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mensaje Profesiol</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            font-family: Arial, Helvetica, sans-serif;
        }

        .contenedor {
            background: white;
            padding: 40px 60px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            margin: 0;
            font-size: 2.5em;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <h1>Hola todos</h1>
    </div>
</body>
</html>
